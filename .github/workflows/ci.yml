name: ci
on: [push, pull_request]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Import app & validate schema
        run: |
          python -c "from app.main import app; print('app ok:', app.title)"
          python -c "from app.models import EjarContract; print('schema props:', len(EjarContract.model_json_schema()['properties']))"
